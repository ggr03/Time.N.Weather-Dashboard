<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time & Weather</title>
    <link rel="icon" type="image/png" href="time.n.weather.png">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.8.0/suncalc.min.js"></script>

    <style>
        /* --- BASE VARIABLES --- */
        :root {
            --bg-body: #0f172a;
            --accent-weather: #38bdf8;
            --danger: #f87171;
            --font-sm: clamp(0.7rem, 0.5vw + 0.4rem, 0.85rem);
            --font-md: clamp(0.9rem, 1vw + 0.5rem, 1.05rem);
            --font-lg: clamp(1.1rem, 2vw + 1rem, 1.4rem);
            --font-xl: clamp(1.5rem, 3vw + 1rem, 2rem);
        }

        /* --- GLOBAL STYLES --- */
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-body); 
            color: #f8fafc; 
            margin: 0; 
            padding: 1rem; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }

        .page-header { 
            text-align: center; 
            margin-bottom: 1.5rem; 
            cursor: pointer; 
        }

        .page-header h1 { 
            margin: 0; 
            font-size: var(--font-xl); 
            letter-spacing: 1px; 
            color: #f8fafc; 
        }

        /* --- LAYOUT --- */
        .main-container { 
            display: flex; 
            flex-direction: row; 
            gap: 2rem; 
            width: 100%; 
            max-width: 1200px; 
            align-items: flex-start; 
        }

        .sidebar { 
            width: 360px; 
            min-width: 360px; 
            display: flex; 
            flex-direction: column; 
            gap: 1rem; 
        }

        /* --- SEARCH CONTROLS --- */
        .search-container { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            gap: 10px; 
            width: 100%; 
        }

        input { 
            flex-grow: 1; 
            padding: 0.8rem; 
            border-radius: 8px; 
            border: 1px solid #334155; 
            background-color: #1e293b; 
            color: #f8fafc; 
            font-size: var(--font-md); 
            outline: none; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); 
            width: 100%; 
            box-sizing: border-box; 
        }

        input:focus { 
            border-color: #38bdf8; 
        }

        button.add-btn { 
            padding: 0.8rem 1rem; 
            background-color: #38bdf8; 
            color: #0f172a; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            font-size: var(--font-md); 
            cursor: pointer; 
            transition: opacity 0.2s; 
            white-space: nowrap; 
        }

        button.add-btn:hover { 
            opacity: 0.8; 
        }

        /* --- TABS (SIDEBAR) --- */
        .tabs-wrapper { 
            width: 100%; 
            display: flex; 
            flex-direction: column; 
            gap: 16px; 
            max-height: calc(80vh - 60px); 
            overflow-y: auto; 
            overflow-x: hidden; 
            scrollbar-width: thin; 
            scrollbar-color: #334155 transparent; 
            padding-right: 16px; 
        }

        .tab { 
            padding: 24px 24px; 
            border-radius: 8px; 
            border: 2px solid transparent; 
            cursor: pointer; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            transition: all 0.2s; 
            width: 100%; 
            box-sizing: border-box; 
            position: relative; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.2); 
        }

        .tab.active { 
            transform: scale(1.03); 
            border-color: #38bdf8; 
            box-shadow: 0 10px 15px -3px rgba(56, 189, 248, 0.3); 
            z-index: 10; 
        }

        .tab-day { 
            background-color: #243B6B; 
            color: #f8fafc; 
        }

        .tab-night { 
            background-color: #1e293b; 
            color: #f8fafc; 
            border: 1px solid #334155; 
        }

        .tab-content-wrapper { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            text-align: center; 
            width: 100%; 
        }

        .tab-city-name { 
            font-weight: 800; 
            font-size: var(--font-lg); 
            margin-bottom: 8px; 
        }

        .tab-datetime { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 4px; 
            font-size: var(--font-md); 
            font-family: monospace; 
        }

        .tab-day .tab-datetime { color: #cbd5e1; }
        .tab-night .tab-datetime { color: #94a3b8; }

        .time-highlight { 
            font-size: 1.2em; 
            font-weight: bold; 
            color: inherit; 
        }

        .tab-day .time-highlight { color: #7dd3fc; }
        .tab-night .time-highlight { color: #38bdf8; }

        .tab-close { 
            position: absolute; 
            top: 8px; 
            right: 8px; 
            background: rgba(0,0,0,0.1); 
            border: none; 
            width: 24px; 
            height: 24px; 
            font-size: 1rem; 
            cursor: pointer; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transition: 0.2s; 
        }

        .tab-night .tab-close { color: #94a3b8; background: rgba(255,255,255,0.1); }
        .tab-day .tab-close { color: #94a3b8; background: rgba(255,255,255,0.1); }
        .tab-close:hover { color: #ffffff; background: var(--danger); }

        /* --- CONTENT AREA (WEATHER) --- */
        #content-container { 
            flex: 1; 
            width: 100%; 
        }

        .content-area { 
            width: 100%; 
            max-width: 100%; 
            display: none; 
            flex-direction: column; 
            align-items: center; 
            padding: 2rem; 
            border-radius: 24px; 
            box-sizing: border-box; 
            transition: background-color 0.4s ease, color 0.4s ease; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); 
            animation: fadeIn 0.3s ease-in-out; 
        }

        .content-area.active { 
            display: flex; 
        }

        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        /* --- THEMES --- */
        .theme-night { 
            background-color: #000000; 
            color: #f8fafc; 
            --card-bg: #111827; 
            --card-hover: #1f2937; 
            --text-main: #f8fafc; 
            --text-muted: #94a3b8; 
            --border-color: #334155; 
            --accent: #38bdf8; 
        }

        .theme-day { 
            background-color: #243B6B; 
            color: #f8fafc; 
            --card-bg: #4F7CAC; 
            --card-hover: #436a93; 
            --text-main: #f8fafc; 
            --text-muted: #e2e8f0; 
            --border-color: #3b5f8f; 
            --accent: #1e3a8a; 
        }

        /* --- WEATHER METRICS --- */
        .weather-section { 
            width: 100%; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }

        .view-toggle { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 2rem; 
            background: var(--card-bg); 
            padding: 6px; 
            border-radius: 12px; 
            border: 1px solid var(--border-color); 
            flex-wrap: wrap;
            justify-content: center;
        }

        .toggle-btn { 
            background: transparent; 
            border: none; 
            padding: 10px 20px; 
            color: var(--text-muted); 
            font-weight: 600; 
            border-radius: 8px; 
            cursor: pointer; 
            transition: all 0.2s; 
            font-size: var(--font-md); 
        }

        .toggle-btn.active { 
            background: var(--accent); 
            color: #ffffff; 
        }

        .bento-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); 
            gap: 16px; 
            width: 100%; 
        }

        .bento-card { 
            background-color: var(--card-bg); 
            padding: 1.5rem; 
            border-radius: 16px; 
            border: 1px solid var(--border-color); 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            transition: transform 0.2s, background-color 0.2s; 
        }

        .bento-card:hover { 
            transform: translateY(-2px); 
            background-color: var(--card-hover); 
        }

        .metric-label { 
            color: var(--text-muted); 
            font-size: var(--font-sm); 
            margin-bottom: 8px; 
            text-transform: uppercase; 
            font-weight: 700; 
            letter-spacing: 1px;
        }

        .metric-value { 
            font-size: var(--font-lg); 
            font-weight: 700; 
            color: var(--text-main); 
            line-height: 1.2; 
        }

        .metric-sub { 
            font-size: var(--font-sm); 
            color: var(--text-muted); 
            margin-top: 4px; 
        }

        .card-temp .metric-value { color: var(--accent-weather); }
        .card-sun .metric-value { font-size: var(--font-lg); color: #fbbf24; }
        .card-moon .metric-value { font-size: var(--font-lg); color: #cbd5e1; }

        /* --- LUNAR METRICS & LIGHTING --- */
        .lighting-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 16px;
            width: 100%;
            margin-top: 16px;
        }

        .lighting-card {
            background-color: var(--card-bg);
            padding: 1.5rem;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .lighting-card h4 {
            font-size: var(--font-lg);
            margin: 0;
            color: var(--accent-weather);
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.8rem;
        }

        .lighting-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .lighting-label {
            font-size: var(--font-sm);
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .lighting-time {
            font-size: var(--font-lg);
            font-weight: 700;
            color: var(--text-main);
            font-family: monospace;
        }

        .twilight-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            border-top: 1px dashed var(--border-color);
            padding-top: 1rem;
        }

        .twilight-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: var(--font-md);
        }

        .twilight-row span:first-child {
            color: var(--text-muted);
            font-weight: 600;
        }

        .twilight-row span:last-child {
            font-family: monospace;
            font-weight: 700;
            color: var(--text-main);
        }

        /* --- FORECAST LISTS --- */
        .forecast-view { 
            width: 100%; 
            display: none; 
        }

        .forecast-view h3 { 
            font-size: var(--font-lg); 
            margin: 0 0 1rem 0; 
            color: inherit; 
        }

        .forecast-list { 
            background-color: var(--card-bg); 
            border: 1px solid var(--border-color); 
            border-radius: 16px; 
            padding: 0.5rem 1rem; 
            margin-bottom: 2rem; 
            display: flex; 
            flex-direction: column; 
        }

        .hourly-list { 
            max-height: 400px; 
            overflow-y: auto; 
            scrollbar-width: thin; 
            scrollbar-color: var(--border-color) transparent; 
        }

        .hourly-list::-webkit-scrollbar { width: 6px; }
        .hourly-list::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }

        .forecast-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 1rem 0; 
            border-bottom: 1px solid var(--border-color); 
        }

        .forecast-item:last-child { 
            border-bottom: none; 
        }

        .forecast-time { 
            font-weight: 600; 
            color: var(--text-main); 
            font-size: var(--font-md); 
            flex: 1; 
        }

        .forecast-condition { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            flex: 1; 
            text-align: center; 
        }

        .forecast-icon { 
            font-size: 1.6rem; 
            line-height: 1; 
            margin-bottom: 4px; 
        }

        .forecast-cond-text { 
            font-size: var(--font-sm); 
            color: var(--text-muted); 
            font-weight: 600; 
        }

        .forecast-temps-daily { 
            display: flex; 
            flex-direction: column; 
            gap: 4px; 
            text-align: right; 
            flex: 1; 
        }

        .forecast-temp-main { 
            font-weight: bold; 
            color: var(--accent-weather); 
            font-size: var(--font-md); 
            text-align: right; 
            flex: 1; 
        }

        .temp-row { font-size: var(--font-md); font-weight: bold; }
        .temp-min { color: #93c5fd; }
        .temp-max { color: #fb923c; }

        .temp-f-sub { 
            font-weight: normal; 
            color: var(--text-muted); 
            font-size: var(--font-sm); 
            margin-left: 4px; 
        }

        .loading-text { 
            text-align: center; 
            color: inherit; 
            opacity: 0.8; 
            font-style: italic; 
            padding: 2rem; 
            width: 100%;
        }

        .error-card {
            background-color: rgba(248, 113, 113, 0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 2rem;
            border-radius: 12px;
            text-align: center;
            width: 100%;
        }

        /* --- RESPONSIVE DESIGN --- */
        @media (max-width: 768px) {
            .main-container { 
                flex-direction: column; 
            }
            .sidebar { 
                width: 100%; 
                min-width: unset; 
            }
            .tabs-wrapper { 
                flex-direction: row; 
                overflow-x: auto; 
                overflow-y: hidden; 
                max-height: unset; 
                padding-right: 0; 
                padding-bottom: 16px; 
            }
            .tab { 
                width: auto; 
                min-width: 180px; 
            }
            .view-toggle {
                flex-direction: column;
                width: 100%;
            }
        }
    </style>
</head>

        let myCities = [];

        function escapeHTML(str) {
            if (typeof str !== 'string') return str;
            return str.replace(/[&<>'"]/g, function(match) {
                const escape = { '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' };
                return escape[match];
            });
        }

        document.getElementById('city-search').addEventListener('input', e => {
            const q = e.target.value.trim();
            clearTimeout(geoDebounceTimer);
            if (q.length < GEO_MIN_CHARS) return;
            geoDebounceTimer = setTimeout(() => fetchGeocodeResults(q), 350);
        });

        async function fetchGeocodeResults(query) {
            try {
                const url = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=10&language=en&format=json`;
                const response = await fetch(url);
                if (!response.ok) return;
                const data = await response.json();
                if (!data.results) return;

                const dataList = document.getElementById('city-list');
                geoResults = {}; 

                data.results.forEach(r => {
                    const label = r.admin1 ? `${r.name}, ${r.admin1}, ${r.country}` : `${r.name}, ${r.country}`;
                    geoResults[label.toLowerCase()] = {
                        city: label, country: r.country, tz: r.timezone, lat: r.latitude, lon: r.longitude
                    };
                });

                dataList.innerHTML = '';
                Object.values(geoResults).forEach(loc => {
                    const option = document.createElement('option');
                    option.value = loc.city; 
                    dataList.appendChild(option);
                });

            } catch (e) { console.error("Geocoding Error:", e); }
        }

        function cToF(c) { return Math.round((c * 1.8 + 32) * 10) / 10; }

        function getWeatherDescription(code, isDay = true) {
            if (code === 0) return { icon: isDay ? "☀️" : "🌙", text: isDay ? "Sunny / Clear" : "Clear Night" };
            if (code === 1 || code === 2) return { icon: isDay ? "⛅" : "☁️", text: "Partly Cloudy" };
            if (code === 3) return { icon: "☁️", text: "Overcast" };
            if (code === 45 || code === 48) return { icon: "🌫️", text: "Foggy" };
            if (code >= 51 && code <= 55) return { icon: "🌧️", text: "Drizzle" };
            if (code >= 56 && code <= 57) return { icon: "🌨️", text: "Freezing Drizzle" };
            if (code >= 61 && code <= 65) return { icon: "🌧️", text: "Rain" };
            if (code >= 66 && code <= 67) return { icon: "🌨️", text: "Freezing Rain" };
            if (code >= 71 && code <= 77) return { icon: "❄️", text: "Snow" };
            if (code >= 80 && code <= 82) return { icon: "🌦️", text: "Showers" };
            if (code >= 85 && code <= 86) return { icon: "🌨️", text: "Snow Showers" };
            if (code === 95) return { icon: "⛈️", text: "Thunderstorm" };
            if (code === 96 || code === 99) return { icon: "⛈️", text: "Heavy Storm" };
            return { icon: "🌡️", text: "Unknown" };
        }

        function getAqiDescription(aqi) {
            if (aqi === null || aqi === undefined) return { text: "No Data", color: "#94a3b8" };
            if (aqi <= 50) return { text: "Good", color: "#4ade80" };
            if (aqi <= 100) return { text: "Moderate", color: "#facc15" };
            if (aqi <= 150) return { text: "Unhealthy for Sensitive Groups", color: "#fb923c" };
            if (aqi <= 200) return { text: "Unhealthy", color: "#f87171" };
            if (aqi <= 300) return { text: "Very Unhealthy", color: "#c084fc" };
            return { text: "Hazardous", color: "#a855f7" };
        }

        function init() {
            const dataList = document.getElementById('city-list');
            cityData.sort((a, b) => a.city.localeCompare(b.city)).forEach(location => {
                const option = document.createElement('option');
                option.value = location.city;
                dataList.appendChild(option);
            });

            const saved = localStorage.getItem('dashboardCitiesV15B');
            if (saved) {
                myCities = JSON.parse(saved);
                activeCityName = null; 
            }

            renderApp();
            setInterval(updateLiveClock, 1000);
        }

        function saveToLocal() { localStorage.setItem('dashboardCitiesV15B', JSON.stringify(myCities)); }

        function addCity() {
            const input = document.getElementById('city-search');
            const query = input.value.trim().toLowerCase();
            if (!query) return;

            let location = cityData.find(loc => loc.city.toLowerCase() === query);
            if (!location && geoResults[query]) location = geoResults[query];

            if (!location) return alert("City not found. Please select from the dropdown list.");
            
            if (myCities.some(c => c.city === location.city)) {
                activeCityName = location.city; 
                input.value = ''; renderApp(); return;
            }

            myCities.push(location);
            activeCityName = location.city; 
            input.value = ''; saveToLocal(); renderApp();
        }

        function removeCity(cityName, event) {
            event.stopPropagation(); 
            myCities = myCities.filter(c => c.city !== cityName);
            if (activeCityName === cityName) activeCityName = null;
            saveToLocal(); renderApp();
        }

        function switchTab(cityName) {
            if (activeCityName === cityName) return;
            activeCityName = cityName; renderApp();
        }

        function updateLiveClock() {
            const now = new Date();
            myCities.forEach(location => {
                const safeId = location.city.replace(/[^a-zA-Z0-9]/g, '-');
                const tabTimeEl = document.getElementById(`tab-time-${safeId}`);
                const tabDateEl = document.getElementById(`tab-date-${safeId}`);

                if (tabTimeEl && tabDateEl) {
                    tabTimeEl.textContent = now.toLocaleTimeString('en-US', {
                        timeZone: location.tz, hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit'
                    });
                    tabDateEl.textContent = now.toLocaleDateString('en-US', {
                        timeZone: location.tz, weekday: 'short', month: 'short', day: 'numeric'
                    });
                }
            });
        }

        // Updated for 24-hour clock
        function formatOpenMeteoTime(isoStr) {
            if (!isoStr) return "--:--";
            const timePart = isoStr.split('T')[1];
            return timePart ? timePart : "--:--";
        }

        async function fetchWeather(lat, lon, tz, cityName) {
            const cached = weatherCache[cityName];
            if (cached && (Date.now() - cached.timestamp < CACHE_DURATION)) {
                return cached.data;
            }

            const encTz = encodeURIComponent(tz);
            const weatherUrl = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,dew_point_2m,surface_pressure,wind_speed_10m,is_day,weather_code&hourly=temperature_2m,weather_code,is_day&daily=sunrise,sunset,uv_index_max,temperature_2m_max,temperature_2m_min,weather_code&timezone=${encTz}&wind_speed_unit=mph`;
            const aqiUrl = `https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}&current=us_aqi&timezone=${encTz}`;
            
            try {
                const [weatherRes, aqiRes] = await Promise.all([fetch(weatherUrl), fetch(aqiUrl)]);
                
                if (!weatherRes.ok) {
                    const err = await weatherRes.text();
                    throw new Error(`Weather API Error: ${err}`);
                }
                
                const weatherData = await weatherRes.json();
                let aqiData = null;
                if (aqiRes.ok) aqiData = await aqiRes.json();

                const data = { ...weatherData, airQuality: aqiData };
                weatherCache[cityName] = { data: data, timestamp: Date.now() };
                return data;
            } catch (error) { 
                console.error(error);
                return null; 
            }
        }

        function generateForecastHtml(data) {
            const currentIso = data.current?.time; 
            let startIndex = data.hourly?.time?.indexOf(currentIso) ?? 0;
            if (startIndex === -1) startIndex = 0; 
            
            let hourlyHtml = '<div class="forecast-list hourly-list">';
            const maxHourly = Math.min(startIndex + 24, data.hourly?.time?.length || 0);
            
            for(let i = startIndex; i < maxHourly; i++) {
                let timeStr = formatOpenMeteoTime(data.hourly.time[i]);
                let tempC = data.hourly.temperature_2m?.[i] ?? 0;
                let tempF = cToF(tempC);
                
                let isDayFlag = (data.hourly.is_day && data.hourly.is_day[i] !== undefined) ? (data.hourly.is_day[i] === 1) : true;
                let condition = getWeatherDescription(data.hourly.weather_code?.[i] ?? 0, isDayFlag);
                
                hourlyHtml += `
                    <div class="forecast-item">
                        <span class="forecast-time">${escapeHTML(timeStr)}</span>
                        <div class="forecast-condition">
                            <span class="forecast-icon">${condition.icon}</span>
                            <span class="forecast-cond-text">${escapeHTML(condition.text)}</span>
                        </div>
                        <span class="forecast-temp-main">${Math.round(tempC)}°C <span class="temp-f-sub">/ ${Math.round(tempF)}°F</span></span>
                    </div>
                `;
            }
            hourlyHtml += '</div>';

            let dailyHtml = '<div class="forecast-list">';
            const maxDaily = data.daily?.time?.length || 0;
            
            for(let i = 0; i < maxDaily; i++) {
                let dateObj = new Date(data.daily.time[i]);
                dateObj.setMinutes(dateObj.getMinutes() + dateObj.getTimezoneOffset());
                let dayStr = dateObj.toLocaleDateString('en-US', {weekday: 'short', month: 'short', day: 'numeric'});
                
                let minC = data.daily.temperature_2m_min?.[i] ?? 0;
                let maxC = data.daily.temperature_2m_max?.[i] ?? 0;
                let minF = cToF(minC);
                let maxF = cToF(maxC);
                
                let condition = getWeatherDescription(data.daily.weather_code?.[i] ?? 0, true);

                dailyHtml += `
                    <div class="forecast-item">
                        <span class="forecast-time">${escapeHTML(dayStr)}</span>
                        
                        <div class="forecast-condition">
                            <span class="forecast-icon">${condition.icon}</span>
                            <span class="forecast-cond-text">${escapeHTML(condition.text)}</span>
                        </div>

                        <div class="forecast-temps-daily">
                            <span class="temp-row temp-max">High: ${Math.round(maxC)}°C <span class="temp-f-sub">(${Math.round(maxF)}°F)</span></span>
                            <span class="temp-row temp-min">Low: ${Math.round(minC)}°C <span class="temp-f-sub">(${Math.round(minF)}°F)</span></span>
                        </div>
                    </div>
                `;
            }
            dailyHtml += '</div>';

            return { hourlyHtml, dailyHtml };
        }

        // Helper to calculate upcoming Full Moon and New Moon calendar dates
        function getNextMoonDates(now, tz) {
            let nextFull = null;
            let nextNew = null;
            let prevPhase = SunCalc.getMoonIllumination(now).phase;
            
            for (let i = 1; i <= 35 * 24; i++) {
                let checkDate = new Date(now.getTime() + i * 3600 * 1000);
                let phase = SunCalc.getMoonIllumination(checkDate).phase;
                
                if (!nextFull && prevPhase < 0.5 && phase >= 0.5) {
                    nextFull = checkDate;
                }
                if (!nextNew && prevPhase > 0.8 && phase < 0.2) {
                    nextNew = checkDate;
                }
                prevPhase = phase;
                if (nextFull && nextNew) break;
            }

            const opts = { timeZone: tz, month: 'short', day: 'numeric', year: 'numeric' };
            return {
                fullDate: nextFull ? nextFull.toLocaleDateString('en-US', opts) : "--",
                newDate: nextNew ? nextNew.toLocaleDateString('en-US', opts) : "--"
            };
        }

        function getMoonPhaseInfo(phase) {
            if (phase < 0.03 || phase > 0.97) return { name: "New Moon", icon: "🌑" };
            if (phase < 0.22) return { name: "Waxing Crescent", icon: "🌒" };
            if (phase < 0.28) return { name: "First Quarter", icon: "🌓" };
            if (phase < 0.47) return { name: "Waxing Gibbous", icon: "🌔" };
            if (phase < 0.53) return { name: "Full Moon", icon: "🌕" };
            if (phase < 0.72) return { name: "Waning Gibbous", icon: "🌖" };
            if (phase < 0.78) return { name: "Last Quarter", icon: "🌗" };
            return { name: "Waning Crescent", icon: "🌘" };
        }

                const sunPosData = SunCalc.getPosition(now, location.lat, location.lon);

                const sunAltitude = Math.round(sunPosData.altitude * 180 / Math.PI);

                const fmtSun = (d) => {

                    // Updated to 24-hour clock

                        <div class="bento-card card-moon">
                            <span class="metric-label">Moonrise & Moonset</span>
                            <span class="metric-value">🌛 ${escapeHTML(moonriseStr)}</span>
                            <span class="metric-value" style="margin-top: 10px; opacity: 0.8;">🌜 ${escapeHTML(moonsetStr)}</span>
                        </div>
                        
                        <div class="bento-card">
                            <span class="metric-label">Solar Position</span>
                            <span class="metric-value" style="font-size: var(--font-md);">☀️ Noon: ${fmtSun(sunTimes.solarNoon)}</span>
                            <span class="metric-value" style="font-size: var(--font-md); margin-top: 6px;">🌑 Nadir: ${fmtSun(sunTimes.nadir)}</span>
                            <div style="display: flex; justify-content: space-between; margin-top: 10px; border-top: 1px dashed var(--border-color); padding-top: 10px;">
                                <div style="display: flex; flex-direction: column;">
                                    <span class="metric-label" style="margin-bottom: 2px;">Azimuth</span>
                                    <span class="metric-value" style="font-size: var(--font-md);">${sunAzimuth}°</span>
                                </div>
                                <div style="display: flex; flex-direction: column; text-align: right;">
                                    <span class="metric-label" style="margin-bottom: 2px;">Altitude</span>
                                    <span class="metric-value" style="font-size: var(--font-md);">${sunAltitude}°</span>
                                </div>
                            </div>
                        </div>

                        <div class="bento-card">
                            <span class="metric-label">Day & Night Length</span>
                            <span class="metric-value" style="font-size: var(--font-lg);">☀️ ${dayLengthStr}</span>
                            <span class="metric-value" style="margin-top: 10px; color: #cbd5e1; font-size: var(--font-lg);">🌙 ${nightLengthStr}</span>
                        </div>
                        <div class="bento-card">
                            <span class="metric-label">Air Quality (AQI)</span>
                            <span class="metric-value" style="color: ${aqiObj.color};">${aqiVal}</span>
                            <span class="metric-sub">${aqiObj.text}</span>
                        </div>
                        <div class="bento-card">
                            <span class="metric-label">Humidity</span>
                            <span class="metric-value">${cur.relative_humidity_2m ?? 0}%</span>
                            <span class="metric-sub">Dewpoint: ${Math.round(cur.dew_point_2m ?? 0)}°C / ${Math.round(cToF(cur.dew_point_2m ?? 0))}°F</span>
                        </div>
                        <div class="bento-card">
                            <span class="metric-label">Wind Speed</span>
                            <span class="metric-value">${cur.wind_speed_10m ?? 0}</span>
                            <span class="metric-sub">mph</span>
                        </div>
                        <div class="bento-card">
                            <span class="metric-label">Air Pressure</span>
                            <span class="metric-value">${cur.surface_pressure ?? 0}</span>
                            <span class="metric-sub">hPa</span>
                        </div>
                        <div class="bento-card">
                            <span class="metric-label">Max UV Index</span>
                            <span class="metric-value">${day?.uv_index_max?.[0] || "--"}</span>
                            <span class="metric-sub">Daily Peak</span>
                        </div>
                    </div>

                    <div id="hourly-view" class="forecast-view">
                        <h3>Next 24 Hours</h3>
                        ${forecasts.hourlyHtml}
                    </div>

                    <div id="daily-view" class="forecast-view">
                        <h3>7-Day Forecast</h3>
                        ${forecasts.dailyHtml}
                    </div>

                    <div id="lunar-view" class="forecast-view">
                        <div class="bento-grid">
                            <div class="bento-card">
                                <span class="metric-label">MOON PHASE</span>
                                <div class="metric-value" style="font-size: 1.8rem; margin-bottom: 4px;">${moonPhaseInfo.icon}</div>
                                <span class="metric-value" style="font-size: var(--font-md);">${moonPhaseInfo.name}</span>
                            </div>
                            <div class="bento-card">
                                <span class="metric-label">ILLUMINATION</span>
                                <div class="metric-value">${Math.round(moonIllum.fraction * 100)}%</div>
                                <span class="metric-sub">Lit Surface Fraction</span>
                            </div>
                            <div class="bento-card">
                                <span class="metric-label">EARTH DISTANCE</span>
                                <div class="metric-value">${Math.round(moonPos.distance).toLocaleString()} km</div>
                                <span class="metric-sub">Geocentric Distance</span>
                            </div>
                            <div class="bento-card">
                                <span class="metric-label">NEXT FULL MOON</span>
                                <div class="metric-value" style="font-size: var(--font-md);">${nextMoons.fullDate}</div>
                            </div>
                            <div class="bento-card">
                                <span class="metric-label">NEXT NEW MOON</span>
                                <div class="metric-value" style="font-size: var(--font-md);">${nextMoons.newDate}</div>
                            </div>
                            <div class="bento-card">
                                <span class="metric-label">MOON AGE</span>
                                <div class="metric-value">${moonAgeDays} days</div>
                                <span class="metric-sub">Synodic Cycle Progress</span>
                            </div>
                        </div>

                        <div class="lighting-grid">
                            <div class="lighting-card">
                                <h4>🌅 Morning Light</h4>
                                <div class="lighting-item">
                                    <span class="lighting-label">BLUE HOUR (-8° TO -4°)</span>
                                    <span class="lighting-time">${fmtSun(sunTimes.blueHourMorningStart)} -&gt; ${fmtSun(sunTimes.blueHourMorningEnd)}</span>
                                </div>
                                <div class="lighting-item">
                                    <span class="lighting-label">GOLDEN HOUR (-4° TO +6°)</span>
                                    <span class="lighting-time">${fmtSun(sunTimes.blueHourMorningEnd)} -&gt; ${fmtSun(sunTimes.goldenHourEnd)}</span>
                                </div>
                                <div class="twilight-list">
                                    <span class="lighting-label" style="margin-bottom: 4px;">MORNING TWILIGHTS</span>
                                    <div class="twilight-row">
                                        <span>Astronomical:</span>
                                        <span>${fmtSun(sunTimes.nightEnd)} -&gt; ${fmtSun(sunTimes.nauticalDawn)}</span>
                                    </div>
                                    <div class="twilight-row">
                                        <span>Nautical:</span>
                                        <span>${fmtSun(sunTimes.nauticalDawn)} -&gt; ${fmtSun(sunTimes.dawn)}</span>
                                    </div>
                                    <div class="twilight-row">
                                        <span>Civil:</span>
                                        <span>${fmtSun(sunTimes.dawn)} -&gt; ${fmtSun(sunTimes.sunrise)}</span>
                                    </div>
                                </div>
                            </div>

                            <div class="lighting-card">
                                <h4>🌇 Evening Light</h4>
                                <div class="lighting-item">
                                    <span class="lighting-label">GOLDEN HOUR (+6° TO -4°)</span>
                                    <span class="lighting-time">${fmtSun(sunTimes.goldenHour)} -&gt; ${fmtSun(sunTimes.blueHourEveningStart)}</span>
                                </div>
                                <div class="lighting-item">
                                    <span class="lighting-label">BLUE HOUR (-4° TO -8°)</span>
                                    <span class="lighting-time">${fmtSun(sunTimes.blueHourEveningStart)} -&gt; ${fmtSun(sunTimes.blueHourEveningEnd)}</span>
                                </div>
                                <div class="twilight-list">
                                    <span class="lighting-label" style="margin-bottom: 4px;">EVENING TWILIGHTS</span>
                                    <div class="twilight-row">
                                        <span>Civil:</span>
                                        <span>${fmtSun(sunTimes.sunset)} -&gt; ${fmtSun(sunTimes.dusk)}</span>
                                    </div>
                                    <div class="twilight-row">
                                        <span>Nautical:</span>
                                        <span>${fmtSun(sunTimes.dusk)} -&gt; ${fmtSun(sunTimes.nauticalDusk)}</span>
                                    </div>
                                    <div class="twilight-row">
                                        <span>Astronomical:</span>
                                        <span>${fmtSun(sunTimes.nauticalDusk)} -&gt; ${fmtSun(sunTimes.night)}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;

            } else {
                section.innerHTML = `
                    <div class="error-card">
                        <h3>Connection Failed</h3>
                        <p>We couldn't reach the weather servers. Please check your internet connection or try searching for the city again.</p>
                    </div>`;
            }
        }

        document.addEventListener('click', (event) => {
            const isTab = event.target.closest('.tab');
            const isContent = event.target.closest('.content-area');
            const isSearch = event.target.closest('.search-container');
            
            if (!isTab && !isContent && !isSearch) {
                if (activeCityName !== null) {
                    activeCityName = null;
                    renderApp(); 
                }
            }
        });

        document.getElementById('add-city-btn').addEventListener('click', addCity);

        document.getElementById('city-search').addEventListener('keypress', e => { 
            if (e.key === 'Enter') addCity(); 
        });

        init();
    </script>
</body>
</html>
