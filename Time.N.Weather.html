<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://geocoding-api.open-meteo.com https://api.open-meteo.com https://air-quality-api.open-meteo.com; base-uri 'none'; form-action 'none'; upgrade-insecure-requests;">
    <meta name="theme-color" content="#0f172a">
    <title>Time & Weather</title>
    <link rel="icon" type="image/png" href="time.n.weather.png">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.8.0/suncalc.min.js"
            integrity="sha512-s40QuZdS5wcjdt2OHUWSGRCECWr+YqbvRSaiBpEKOlOsbePPvXreeOTB4SVteinFcc1RpW/uDueEsknm9iJl2g=="
            crossorigin="anonymous"
            referrerpolicy="no-referrer"></script>

    <style>
        /* --- BASE VARIABLES --- */
        :root {
            --bg-body: #0f172a;
            --accent-weather: #38bdf8;
            --danger: #f87171;
            --font-sm: clamp(0.7rem, 0.5vw + 0.4rem, 0.85rem);
            --font-md: clamp(0.9rem, 1vw + 0.5rem, 1.05rem);
            --font-lg: clamp(1.1rem, 2vw + 1rem, 1.4rem);
            --font-xl: clamp(1.5rem, 3vw + 1rem, 2rem);
        }

        /* --- GLOBAL STYLES --- */
        *, *::before, *::after {
            box-sizing: border-box;
        }

        html {
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-body); 
            color: #f8fafc; 
            margin: 0; 
            padding: 1rem; 
            padding-top: max(1rem, env(safe-area-inset-top)); 
            padding-bottom: max(1rem, env(safe-area-inset-bottom)); 
            padding-left: max(1rem, env(safe-area-inset-left)); 
            padding-right: max(1rem, env(safe-area-inset-right)); 
            min-height: 100vh; 
            min-height: 100dvh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            -webkit-tap-highlight-color: transparent; 
            overflow-x: hidden; 
            width: 100%; 
        }

        .page-header { 
            text-align: center; 
            margin-bottom: 1.5rem; 
            cursor: pointer; 
        }

        .page-header h1 { 
            margin: 0; 
            font-size: var(--font-xl); 
            letter-spacing: 1px; 
            color: #f8fafc; 
        }

        /* --- LAYOUT --- */
        .main-container { 
            display: flex; 
            flex-direction: row; 
            gap: 2rem; 
            width: 100%; 
            max-width: 1200px; 
            align-items: flex-start; 
        }

        .sidebar { 
            width: 360px; 
            min-width: 360px; 
            display: flex; 
            flex-direction: column; 
            gap: 1rem; 
        }

        /* --- SEARCH CONTROLS --- */
        .search-container { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            gap: 10px; 
            width: 100%; 
            flex-wrap: wrap;
        }

        input { 
            flex-grow: 1; 
            padding: 0.8rem; 
            border-radius: 8px; 
            border: 1px solid #334155; 
            background-color: #1e293b; 
            color: #f8fafc; 
            font-size: max(16px, var(--font-md)); 
            outline: none; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); 
            width: 100%; 
            box-sizing: border-box; 
        }

        input:focus { 
            border-color: #38bdf8; 
        }

        button.add-btn { 
            padding: 0.8rem 1rem; 
            background-color: #38bdf8; 
            color: #0f172a; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            font-size: var(--font-md); 
            cursor: pointer; 
            transition: opacity 0.2s; 
            white-space: nowrap; 
        }

        button.add-btn:hover { 
            opacity: 0.8; 
        }

        /* --- TABS (SIDEBAR) --- */
        .tabs-wrapper { 
            width: 100%; 
            display: flex; 
            flex-direction: column; 
            gap: 16px; 
            max-height: calc(80vh - 60px); 
            overflow-y: auto; 
            overflow-x: hidden; 
            scrollbar-width: thin; 
            scrollbar-color: #334155 transparent; 
            padding: 12px 16px 12px 12px; 
            box-sizing: border-box; 
            -webkit-overflow-scrolling: touch; 
        }

        .tab { 
            padding: 24px; 
            border-radius: 16px; 
            border: 2px solid transparent; 
            cursor: pointer; 
            display: flex; 
            flex-direction: column; 
            align-items: flex-start; 
            text-align: left;
            transition: all 0.2s; 
            width: 100%; 
            box-sizing: border-box; 
            position: relative; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.2); 
            touch-action: manipulation; 
        }

        .tab.active { 
            transform: scale(1.03); 
            border-color: #38bdf8; 
            box-shadow: 0 10px 15px -3px rgba(56, 189, 248, 0.3); 
            z-index: 10; 
        }

        .tab-day { 
            background-color: #243B6B; 
            color: #f8fafc; 
        }

        .tab-night { 
            background-color: #1e293b; 
            color: #f8fafc; 
            border: 1px solid #334155; 
        }

        .tab-grip {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 14px;
            color: #475569;
            cursor: grab;
            user-select: none;
        }

        .tab-content-wrapper { 
            display: flex; 
            flex-direction: column; 
            align-items: flex-start; 
            text-align: left; 
            width: 100%; 
            padding-top: 4px;
        }

        .tab-city-name { 
            font-weight: 800; 
            font-size: var(--font-lg); 
            margin-bottom: 4px; 
            padding-left: 14px; /* Space for the grip */
        }

        .tab-datetime-clock {
            font-size: var(--font-xl);
            font-weight: bold;
            line-height: 1;
            margin-bottom: 4px;
        }

        .tab-day .tab-datetime-clock { color: #7dd3fc; }
        .tab-night .tab-datetime-clock { color: #38bdf8; }

        .tab-datetime-date {
            font-size: var(--font-sm);
            margin-bottom: 8px;
        }

        .tab-day .tab-datetime-date { color: #cbd5e1; }
        .tab-night .tab-datetime-date { color: #94a3b8; }

        .tab-weather-info {
            width: 100%;
        }

        .tab-weather-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: var(--font-md);
            flex-wrap: wrap;
        }

        .tab-weather-icon {
            font-size: 1.8rem;
            line-height: 1;
        }

        .tab-temp-c {
            font-weight: bold;
            font-size: var(--font-lg);
        }

        .tab-temp-f {
            color: #94a3b8;
        }

        .tab-cond-text {
            color: #cbd5e1;
            font-size: var(--font-sm);
        }

        .tab-divider {
            width: 100%;
            border: none;
            border-top: 1px dashed rgba(148, 163, 184, 0.3);
            margin: 8px 0;
        }

        .tab-feels-like {
            font-size: var(--font-sm);
            color: #94a3b8;
        }

        .tab-feels-like span {
            font-weight: bold;
            color: #cbd5e1;
        }

        .tab-close { 
            position: absolute; 
            top: 8px; 
            right: 8px; 
            background: rgba(0,0,0,0.1); 
            border: none; 
            width: 24px; 
            height: 24px; 
            font-size: 1rem; 
            cursor: pointer; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transition: 0.2s; 
        }

        .tab-night .tab-close { color: #94a3b8; background: rgba(255,255,255,0.1); }
        .tab-day .tab-close { color: #94a3b8; background: rgba(255,255,255,0.1); }
        .tab-close:hover { color: #ffffff; background: var(--danger); }

        /* --- CONTENT AREA (WEATHER) --- */
        #content-container { 
            flex: 1; 
            width: 100%; 
        }

        .content-area { 
            width: 100%; 
            max-width: 100%; 
            display: none; 
            flex-direction: column; 
            align-items: center; 
            padding: 2rem; 
            border-radius: 24px; 
            box-sizing: border-box; 
            transition: background-color 0.4s ease, color 0.4s ease; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); 
            animation: fadeIn 0.3s ease-in-out; 
        }

        .content-area.active { 
            display: flex; 
        }

        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        /* --- THEMES --- */
        .theme-night { 
            background-color: #000000; 
            color: #f8fafc; 
            --card-bg: #111827; 
            --card-hover: #1f2937; 
            --text-main: #f8fafc; 
            --text-muted: #94a3b8; 
            --border-color: #334155; 
            --accent: #38bdf8; 
        }

        .theme-day { 
            background-color: #243B6B; 
            color: #f8fafc; 
            --card-bg: #4F7CAC; 
            --card-hover: #436a93; 
            --text-main: #f8fafc; 
            --text-muted: #e2e8f0; 
            --border-color: #3b5f8f; 
            --accent: #1e3a8a; 
        }

        /* --- WEATHER METRICS --- */
        .weather-section { 
            width: 100%; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }

        .view-toggle { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 2rem; 
            background: var(--card-bg); 
            padding: 6px; 
            border-radius: 12px; 
            border: 1px solid var(--border-color); 
            flex-wrap: wrap;
            justify-content: center;
        }

        .toggle-btn { 
            background: transparent; 
            border: none; 
            padding: 10px 20px; 
            color: var(--text-muted); 
            font-weight: 600; 
            border-radius: 8px; 
            cursor: pointer; 
            transition: all 0.2s; 
            font-size: var(--font-md); 
        }

        .toggle-btn.active { 
            background: var(--accent); 
            color: #ffffff; 
        }

        .bento-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); 
            gap: 16px; 
            width: 100%; 
        }

        .bento-card { 
            background-color: var(--card-bg); 
            padding: 1.5rem; 
            border-radius: 16px; 
            border: 1px solid var(--border-color); 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            transition: transform 0.2s, background-color 0.2s; 
        }

        .bento-card:hover { 
            transform: translateY(-2px); 
            background-color: var(--card-hover); 
        }

        /* UV Tooltip Class */
        .card-uv {
            cursor: help;
        }

        .metric-label { 
            color: var(--text-muted); 
            font-size: var(--font-sm); 
            margin-bottom: 8px; 
            text-transform: uppercase; 
            font-weight: 700; 
            letter-spacing: 1px;
        }

        .metric-value { 
            font-size: var(--font-lg); 
            font-weight: 700; 
            color: var(--text-main); 
            line-height: 1.2; 
        }

        .metric-sub { 
            font-size: var(--font-sm); 
            color: var(--text-muted); 
            margin-top: 4px; 
        }

        .card-temp .metric-value { color: var(--accent-weather); }
        .card-sun .metric-value { font-size: var(--font-lg); color: #fbbf24; }
        .card-moon .metric-value { font-size: var(--font-lg); color: #cbd5e1; }

        /* --- LUNAR METRICS & LIGHTING --- */
        .lighting-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 16px;
            width: 100%;
            margin-top: 16px;
        }

        .lighting-card {
            background-color: var(--card-bg);
            padding: 1.5rem;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .lighting-card h4 {
            font-size: var(--font-lg);
            margin: 0;
            color: var(--accent-weather);
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.8rem;
        }

        .lighting-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .lighting-label {
            font-size: var(--font-sm);
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .lighting-time {
            font-size: var(--font-lg);
            font-weight: 700;
            color: var(--text-main);
        }

        .twilight-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            border-top: 1px dashed var(--border-color);
            padding-top: 1rem;
        }

        .twilight-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: var(--font-md);
        }

        .twilight-row span:first-child {
            color: var(--text-muted);
            font-weight: 600;
        }

        .twilight-row span:last-child {
            font-weight: 700;
            color: var(--text-main);
        }

        /* --- FORECAST LISTS --- */
        .forecast-view { 
            width: 100%; 
            display: none; 
        }

        .forecast-view h3 { 
            font-size: var(--font-lg); 
            margin: 0 0 1rem 0; 
            color: inherit; 
        }

        .forecast-list { 
            background-color: var(--card-bg); 
            border: 1px solid var(--border-color); 
            border-radius: 16px; 
            padding: 0.5rem 1rem; 
            margin-bottom: 2rem; 
            display: flex; 
            flex-direction: column; 
        }

        .hourly-list { 
            max-height: 400px; 
            overflow-y: auto; 
            scrollbar-width: thin; 
            scrollbar-color: var(--border-color) transparent; 
        }

        .hourly-list::-webkit-scrollbar { width: 6px; }
        .hourly-list::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }

        .forecast-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 1rem 0; 
            border-bottom: 1px solid var(--border-color); 
        }

        .forecast-item:last-child { 
            border-bottom: none; 
        }

        .forecast-time { 
            font-weight: 600; 
            color: var(--text-main); 
            font-size: var(--font-md); 
            flex: 1; 
        }

        .forecast-condition { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            flex: 1; 
            text-align: center; 
        }

        .forecast-icon { 
            font-size: 1.6rem; 
            line-height: 1; 
            margin-bottom: 4px; 
        }

        .forecast-cond-text { 
            font-size: var(--font-sm); 
            color: var(--text-muted); 
            font-weight: 600; 
        }

        .forecast-temps-daily { 
            display: flex; 
            flex-direction: column; 
            gap: 4px; 
            text-align: right; 
            flex: 1; 
        }

        .forecast-temp-main { 
            font-weight: bold; 
            color: var(--accent-weather); 
            font-size: var(--font-md); 
            text-align: right; 
            flex: 1; 
        }

        .temp-row { font-size: var(--font-md); font-weight: bold; }
        .temp-min { color: #93c5fd; }
        .temp-max { color: #fb923c; }

        .temp-f-sub { 
            font-weight: normal; 
            color: var(--text-muted); 
            font-size: var(--font-sm); 
            margin-left: 4px; 
        }

        .loading-text { 
            text-align: center; 
            color: inherit; 
            opacity: 0.8; 
            font-style: italic; 
            padding: 2rem; 
            width: 100%;
        }

        .error-card {
            background-color: rgba(248, 113, 113, 0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 2rem;
            border-radius: 12px;
            text-align: center;
            width: 100%;
        }

        /* --- RESPONSIVE DESIGN --- */
        @media (max-width: 768px) {
            .main-container { 
                flex-direction: column; 
                gap: 1rem; 
            }
            .sidebar { 
                width: 100%; 
                min-width: unset; 
            }
            .tabs-wrapper { 
                flex-direction: row; 
                overflow-x: auto; 
                overflow-y: hidden; 
                max-height: unset; 
                padding: 12px 12px 16px 12px; 
                gap: 12px; 
            }
            .tab { 
                width: auto; 
                min-width: 170px; 
                padding: 18px 20px; 
                flex-shrink: 0; 
            }
            .view-toggle {
                flex-direction: column;
                width: 100%;
            }
            .content-area {
                padding: 1.5rem;
                border-radius: 16px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding-left: max(0.5rem, env(safe-area-inset-left));
                padding-right: max(0.5rem, env(safe-area-inset-right));
            }
            .search-container > div {
                flex-direction: column;
            }
            button.add-btn {
                width: 100%;
            }
            .tab {
                min-width: 150px;
                padding: 14px 16px;
            }
            .content-area {
                padding: 1rem;
                border-radius: 12px;
            }
            .bento-card, .lighting-card {
                padding: 1rem;
            }
            .lighting-grid {
                grid-template-columns: 1fr;
            }
            .bento-grid {
                grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
                gap: 10px;
            }
            .forecast-item {
                flex-wrap: wrap;
                gap: 6px;
            }
        }

        @media (hover: none) and (pointer: coarse) {
            .tab-close {
                width: 28px;
                height: 28px;
            }
            .toggle-btn, button.add-btn {
                min-height: 44px;
            }
        }
    </style>
</head>
<body>

    <div class="page-header"></div>
    
    <div class="main-container">
        
        <div class="sidebar">
            <div class="search-container">
                <div style="display: flex; gap: 10px; width: 100%;">
                    <input list="city-list" id="city-search" placeholder="Search any city worldwide..." autocomplete="off">
                    <datalist id="city-list"></datalist>
                    <button class="add-btn" id="add-city-btn">Add City</button>
                </div>
            </div>
            <div class="tabs-wrapper" id="tabs-container"></div>
        </div>
        
        <div id="content-container"></div>
        
    </div>

    <script>
        // Configure custom angles for SunCalc photo lighting (-8 deg and -4 deg)
        if (typeof SunCalc !== 'undefined' && !SunCalc._customAnglesAdded) {
            SunCalc.addTime(-8, 'blueHourMorningStart', 'blueHourEveningEnd');
            SunCalc.addTime(-4, 'blueHourMorningEnd', 'blueHourEveningStart');
            SunCalc._customAnglesAdded = true;
        }

        // Translation Dictionary (English Only)
        const lang = {
            search: "Search any city worldwide...",
            add: "Add City",
            local: "Current Conditions",
            h24: "Hourly",
            d7: "Daily",
            lunar: "Astro",
            cond: "Current Condition",
            feels: "Feels like",
            sun: "Sunrise & Sunset",
            moon: "Moonrise & Moonset",
            aqi: "Air Quality (AQI)",
            hum: "Humidity",
            dew: "Dewpoint",
            wind: "Wind Speed",
            press: "Air Pressure",
            uv: "UV Index",
            uv_max: "Today's Max",
            aqi1: "Good",
            aqi2: "Moderate",
            aqi3: "Unhealthy for Sensitive",
            aqi4: "Unhealthy",
            aqi5: "Very Unhealthy",
            aqi6: "Hazardous",
            w0d: "Sunny / Clear",
            w0n: "Clear Night",
            w1: "Partly Cloudy",
            w3: "Overcast",
            w45: "Foggy",
            w51: "Drizzle",
            w56: "Freezing Drizzle",
            w61: "Rain",
            w66: "Freezing Rain",
            w71: "Snow",
            w80: "Showers",
            w85: "Snow Showers",
            w95: "Thunderstorm",
            w96: "Heavy Storm",
            unk: "Unknown",
            load: "Loading meteorological data...",
            err: "Connection Failed",
            err_txt: "We couldn't reach the weather servers. Please check your internet connection or try searching for the city again.",
            solar: "Solar Position",
            noon: "Noon",
            nadir: "Nadir",
            az: "Azimuth",
            alt: "Altitude",
            dn: "Day & Night Length",
            mPhase: "MOON PHASE",
            mIllum: "ILLUMINATION",
            mDist: "EARTH DISTANCE",
            mNextF: "NEXT FULL MOON",
            mNextN: "NEXT NEW MOON",
            mAge: "MOON AGE",
            m_sub1: "Lit Surface Fraction",
            m_sub2: "Geocentric Distance",
            m_sub3: "Synodic Cycle Progress",
            m_light: "Morning Light",
            e_light: "Evening Light",
            b_hour: "BLUE HOUR",
            g_hour: "GOLDEN HOUR",
            m_twi: "MORNING TWILIGHTS",
            e_twi: "EVENING TWILIGHTS",
            astro: "Astronomical:",
            naut: "Nautical:",
            civil: "Civil:",
            pollutants: "Pollutants",
            dust: "Dust",
            vis: "Visibility",
            vis1: "Clear",
            vis2: "Reduced",
            vis3: "Poor",
            vis_na: "Data unavailable"
        };

        function t(key) {
            return lang[key] || key;
        }

        let myCities = [];
        let activeCityName = null;
        let weatherCache = {}; 
        const CACHE_DURATION = 4 * 60 * 60 * 1000;
        let geoDebounceTimer;
        let geoResults = {};
        const GEO_MIN_CHARS = 2;
        let draggedCityIndex = null;

        function escapeHTML(str) {
            if (typeof str !== 'string') return str;
            return str.replace(/[&<>'"]/g, function(match) {
                const escape = { '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' };
                return escape[match];
            });
        }

        document.getElementById('city-search').addEventListener('input', e => {
            const q = e.target.value.trim();
            clearTimeout(geoDebounceTimer);
            if (q.length < GEO_MIN_CHARS) return;
            geoDebounceTimer = setTimeout(() => fetchGeocodeResults(q), 350);
        });

        async function fetchGeocodeResults(query) {
            try {
                const url = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=10&language=en&format=json`;
                const response = await fetch(url);
                if (!response.ok) return;
                const data = await response.json();
                if (!data.results) return;

                const dataList = document.getElementById('city-list');
                geoResults = {}; 

                data.results.forEach(r => {
                    const label = r.admin1 ? `${r.name}, ${r.admin1}, ${r.country}` : `${r.name}, ${r.country}`;
                    geoResults[label.toLowerCase()] = {
                        city: label, country: r.country, cc: r.country_code || '', tz: r.timezone, lat: r.latitude, lon: r.longitude
                    };
                });

                dataList.innerHTML = '';
                Object.values(geoResults).forEach(loc => {
                    const option = document.createElement('option');
                    option.value = loc.city; 
                    dataList.appendChild(option);
                });

            } catch (e) { console.error("Geocoding Error:", e); }
        }

        function cToF(c) { return Math.round((c * 1.8 + 32) * 10) / 10; }

        function getWeatherDescription(code, isDay = true) {
            if (code === 0) return { icon: isDay ? "☀️" : "🌙", text: isDay ? t('w0d') : t('w0n') };
            if (code === 1 || code === 2) return { icon: isDay ? "⛅" : "☁️", text: t('w1') };
            if (code === 3) return { icon: "☁️", text: t('w3') };
            if (code === 45 || code === 48) return { icon: "🌫️", text: t('w45') };
            if (code >= 51 && code <= 55) return { icon: "🌧️", text: t('w51') };
            if (code >= 56 && code <= 57) return { icon: "🌨️", text: t('w56') };
            if (code >= 61 && code <= 65) return { icon: "🌧️", text: t('w61') };
            if (code >= 66 && code <= 67) return { icon: "🌨️", text: t('w66') };
            if (code >= 71 && code <= 77) return { icon: "❄️", text: t('w71') };
            if (code >= 80 && code <= 82) return { icon: "🌦️", text: t('w80') };
            if (code >= 85 && code <= 86) return { icon: "🌨️", text: t('w85') };
            if (code === 95) return { icon: "⛈️", text: t('w95') };
            if (code === 96 || code === 99) return { icon: "⛈️", text: t('w96') };
            return { icon: "🌡️", text: t('unk') };
        }

        function getAqiDescription(aqi) {
            if (aqi === null || aqi === undefined) return { text: "--", color: "#94a3b8" };
            if (aqi <= 50) return { text: t('aqi1'), color: "#4ade80" };
            if (aqi <= 100) return { text: t('aqi2'), color: "#facc15" };
            if (aqi <= 150) return { text: t('aqi3'), color: "#fb923c" };
            if (aqi <= 200) return { text: t('aqi4'), color: "#f87171" };
            if (aqi <= 300) return { text: t('aqi5'), color: "#c084fc" };
            return { text: t('aqi6'), color: "#a855f7" };
        }

        function getVisibilityDescription(meters) {
            if (meters === null || meters === undefined) return t('vis_na');
            if (meters >= 10000) return t('vis1');
            if (meters >= 1000) return t('vis2');
            return t('vis3');
        }

        function init() {
            const saved = localStorage.getItem('dashboardCitiesV21') || localStorage.getItem('dashboardCitiesV20') || localStorage.getItem('dashboardCitiesV19') || localStorage.getItem('dashboardCitiesV18');
            if (saved) {
                myCities = JSON.parse(saved);
                activeCityName = null; 
            }

            renderApp();
            setInterval(updateLiveClock, 1000);
        }

        function saveToLocal() { localStorage.setItem('dashboardCitiesV21', JSON.stringify(myCities)); }

        function getCityDisplayLabel(location) {
            const shortName = (location.city || '').split(',')[0].trim();
            const cc = location.cc || '';
            return cc ? `${shortName} (${cc.toUpperCase()})` : shortName;
        }

        function addCity() {
            const input = document.getElementById('city-search');
            let query = input.value.trim().toLowerCase();
            if (!query) return;

            let location = geoResults[query];

            if (!location) return alert("City not found. Please type a city name and select it from the dynamic dropdown list.");
            
            if (myCities.some(c => c.city === location.city)) {
                activeCityName = location.city; 
                input.value = ''; renderApp(); return;
            }

            myCities.push(location);
            activeCityName = location.city; 
            input.value = ''; saveToLocal(); renderApp();
        }

        function removeCity(cityName, event) {
            event.stopPropagation(); 
            myCities = myCities.filter(c => c.city !== cityName);
            if (activeCityName === cityName) activeCityName = null;
            saveToLocal(); renderApp();
        }

        function switchTab(cityName) {
            if (activeCityName === cityName) return;
            activeCityName = cityName; renderApp();
        }

        function switchSubTab(tabName) {
            document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));

            if (btn) btn.classList.add('active');
            
            document.getElementById('bento-view').style.display = tabName === 'local' ? 'grid' : 'none';
            document.getElementById('hourly-view').style.display = tabName === 'hourly' ? 'block' : 'none';
            document.getElementById('daily-view').style.display = tabName === 'daily' ? 'block' : 'none';
            document.getElementById('lunar-view').style.display = tabName === 'lunar' ? 'block' : 'none';
        }

        async function renderApp() {
            renderTabs();
            const container = document.getElementById('content-container');
            container.innerHTML = '';

            if (!activeCityName || myCities.length === 0) return;

            const activeLocation = myCities.find(c => c.city === activeCityName);
            if (!activeLocation) return;

            const wrapper = document.createElement('div');
            wrapper.className = 'content-area active theme-night';
            wrapper.id = `view-${escapeHTML(activeLocation.city)}`;

            wrapper.innerHTML = `
                <div class="weather-section" id="weather-section">
                    <div class="loading-text">${t('load')}</div>
                </div>
            `;
            container.appendChild(wrapper);

        function renderTabs() {
            const container = document.getElementById('tabs-container');
            container.innerHTML = '';
            
            myCities.forEach((location, index) => {
                const isActive = location.city === activeCityName;
                const btn = document.createElement('div');
                const safeId = location.city.replace(/[^a-zA-Z0-9]/g, '-');
                
                const now = new Date();
                const hourStr = now.toLocaleString('en-US', { timeZone: location.tz, hour: 'numeric', hour12: false });
                const hour = parseInt(hourStr, 10);
                const isDayTime = hour >= 6 && hour < 18;
                const themeClass = isDayTime ? 'tab-day' : 'tab-night';

                btn.className = `tab ${themeClass} ${isActive ? 'active' : ''}`;
                btn.draggable = true;

                btn.addEventListener('click', () => switchTab(location.city));

                // --- DRAG AND DROP HANDLERS ---
                btn.addEventListener('dragstart', (e) => {
                    draggedCityIndex = index;
                    e.dataTransfer.effectAllowed = 'move';
                    setTimeout(() => btn.classList.add('dragging'), 0);
                });

                btn.addEventListener('dragover', (e) => {
                    e.preventDefault(); 
                    e.dataTransfer.dropEffect = 'move';
                    btn.classList.add('drag-over');
                });

                btn.addEventListener('dragleave', () => {
                    btn.classList.remove('drag-over');
                });

                btn.addEventListener('drop', (e) => {
                    e.preventDefault();
                    btn.classList.remove('drag-over');
                    
                    const droppedCityIndex = index;
                    if (draggedCityIndex === null || draggedCityIndex === droppedCityIndex) return;

                    const draggedItem = myCities.splice(draggedCityIndex, 1)[0];
                    myCities.splice(droppedCityIndex, 0, draggedItem);
                    
                    saveToLocal();
                    renderTabs(); 
                });

                btn.addEventListener('dragend', () => {
                    btn.classList.remove('dragging');
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('drag-over'));
                    draggedCityIndex = null;
                });
                
                btn.innerHTML = `
                    <div class="tab-grip">⁝⁝</div>
                    <button class="tab-close">&times;</button>
                    <div class="tab-content-wrapper">
                        <div class="tab-city-name">${escapeHTML(getCityDisplayLabel(location))}</div>
                        <div class="tab-datetime-clock" id="tab-time-${safeId}">--:--:--</div>
                        <div class="tab-datetime-date" id="tab-date-${safeId}">----, --- --</div>
                        <div class="tab-weather-info" id="tab-weather-${safeId}">
                            <div style="font-size: var(--font-sm); opacity: 0.6; padding-left: 14px;">Loading weather...</div>
                        </div>
                    </div>
                `;

                const closeBtn = btn.querySelector('.tab-close');

                container.appendChild(btn);

        function formatOpenMeteoTime(isoStr) {
            if (!isoStr) return "--:--";
            const timePart = isoStr.split('T')[1];
            return timePart ? timePart : "--:--";
        }

        async function fetchWeather(lat, lon, tz, cityName) {
            const cached = weatherCache[cityName];
            if (cached && (Date.now() - cached.timestamp < CACHE_DURATION)) {
                return cached.data;
            }

            const encTz = encodeURIComponent(tz);
            const weatherUrl = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,dew_point_2m,surface_pressure,wind_speed_10m,visibility,uv_index,is_day,weather_code&hourly=temperature_2m,weather_code,is_day&daily=sunrise,sunset,uv_index_max,temperature_2m_max,temperature_2m_min,weather_code&timezone=${encTz}&wind_speed_unit=mph`;
            const aqiUrl = `https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}&current=us_aqi,carbon_dioxide,nitrogen_dioxide,dust&timezone=${encTz}`;
            
            try {
                const [weatherRes, aqiRes] = await Promise.all([fetch(weatherUrl), fetch(aqiUrl)]);
                
                if (!weatherRes.ok) {
                    const err = await weatherRes.text();
                    throw new Error(`Weather API Error: ${err}`);
                }
                
                const weatherData = await weatherRes.json();
                let aqiData = null;
                if (aqiRes.ok) aqiData = await aqiRes.json();

                const data = { ...weatherData, airQuality: aqiData };
                weatherCache[cityName] = { data: data, timestamp: Date.now() };
                return data;
            } catch (error) { 
                console.error(error);
                return null; 
            }
        }

        function generateForecastHtml(data) {
            const currentIso = data.current?.time; 
            let startIndex = data.hourly?.time?.indexOf(currentIso) ?? 0;
            if (startIndex === -1) startIndex = 0; 
            const locale = 'en-US';
            
            let hourlyHtml = '<div class="forecast-list hourly-list">';
            const maxHourly = Math.min(startIndex + 24, data.hourly?.time?.length || 0);
            
            for(let i = startIndex; i < maxHourly; i++) {
                let timeStr = formatOpenMeteoTime(data.hourly.time[i]);
                let tempC = data.hourly.temperature_2m?.[i] ?? 0;
                let tempF = cToF(tempC);
                
                let isDayFlag = (data.hourly.is_day && data.hourly.is_day[i] !== undefined) ? (data.hourly.is_day[i] === 1) : true;
                let condition = getWeatherDescription(data.hourly.weather_code?.[i] ?? 0, isDayFlag);
                
                hourlyHtml += `
                    <div class="forecast-item">
                        <span class="forecast-time">${escapeHTML(timeStr)}</span>
                        <div class="forecast-condition">
                            <span class="forecast-icon">${condition.icon}</span>
                            <span class="forecast-cond-text">${escapeHTML(condition.text)}</span>
                        </div>
                        <span class="forecast-temp-main">${Math.round(tempC)}°C <span class="temp-f-sub">/ ${Math.round(tempF)}°F</span></span>
                    </div>
                `;
            }
            hourlyHtml += '</div>';

            let dailyHtml = '<div class="forecast-list">';
            const maxDaily = data.daily?.time?.length || 0;
            
            for(let i = 0; i < maxDaily; i++) {
                let dateObj = new Date(data.daily.time[i]);
                dateObj.setMinutes(dateObj.getMinutes() + dateObj.getTimezoneOffset());
                let dayStr = dateObj.toLocaleDateString(locale, {weekday: 'short', month: 'short', day: 'numeric'});
                
                let minC = data.daily.temperature_2m_min?.[i] ?? 0;
                let maxC = data.daily.temperature_2m_max?.[i] ?? 0;
                let minF = cToF(minC);
                let maxF = cToF(maxC);
                
                let condition = getWeatherDescription(data.daily.weather_code?.[i] ?? 0, true);

                dailyHtml += `
                    <div class="forecast-item">
                        <span class="forecast-time">${escapeHTML(dayStr)}</span>
                        
                        <div class="forecast-condition">
                            <span class="forecast-icon">${condition.icon}</span>
                            <span class="forecast-cond-text">${escapeHTML(condition.text)}</span>
                        </div>

                        <div class="forecast-temps-daily">
                            <span class="temp-row temp-max">↑ ${Math.round(maxC)}°C <span class="temp-f-sub">(${Math.round(maxF)}°F)</span></span>
                            <span class="temp-row temp-min">↓ ${Math.round(minC)}°C <span class="temp-f-sub">(${Math.round(minF)}°F)</span></span>
                        </div>
                    </div>
                `;
            }
            dailyHtml += '</div>';

            return { hourlyHtml, dailyHtml };
        }

        // Helper to calculate upcoming Full Moon and New Moon calendar dates
        function getNextMoonDates(now, tz) {
            let nextFull = null;
            let nextNew = null;
            let prevPhase = SunCalc.getMoonIllumination(now).phase;
            const locale = 'en-US';
            
            for (let i = 1; i <= 35 * 24; i++) {
                let checkDate = new Date(now.getTime() + i * 3600 * 1000);
                let phase = SunCalc.getMoonIllumination(checkDate).phase;
                
                if (!nextFull && prevPhase < 0.5 && phase >= 0.5) {
                    nextFull = checkDate;
                }
                if (!nextNew && prevPhase > 0.8 && phase < 0.2) {
                    nextNew = checkDate;
                }
                prevPhase = phase;
                if (nextFull && nextNew) break;
            }

            const opts = { timeZone: tz, month: 'short', day: 'numeric', year: 'numeric' };
            return {
                fullDate: nextFull ? nextFull.toLocaleDateString(locale, opts) : "--",
                newDate: nextNew ? nextNew.toLocaleDateString(locale, opts) : "--"
            };
        }

        function getMoonPhaseInfo(phase) {
            if (phase < 0.03 || phase > 0.97) return { name: "New Moon", icon: "🌑" };
            if (phase < 0.22) return { name: "Waxing Crescent", icon: "🌒" };
            if (phase < 0.28) return { name: "First Quarter", icon: "🌓" };
            if (phase < 0.47) return { name: "Waxing Gibbous", icon: "🌔" };
            if (phase < 0.53) return { name: "Full Moon", icon: "🌕" };
            if (phase < 0.72) return { name: "Waning Gibbous", icon: "🌖" };
            if (phase < 0.78) return { name: "Last Quarter", icon: "🌗" };
            return { name: "Waning Crescent", icon: "🌘" };
        }

        async function renderWeatherMetrics(location, wrapperElement) {
            const data = await fetchWeather(location.lat, location.lon, location.tz, location.city);

                const sunsetIso = day?.sunset?.[0];
                const sunrise = formatOpenMeteoTime(sunriseIso);
                const sunset = formatOpenMeteoTime(sunsetIso);

                // Calculate Day and Night Length

                let nightLengthStr = "--";
                if (sunriseIso && sunsetIso) {
                    const srDate = new Date(sunriseIso);
                    const ssDate = new Date(sunsetIso);
                    let diffMs = ssDate.getTime() - srDate.getTime();
                    
                    if (diffMs > 0) {
                        const totalMins = Math.floor(diffMs / 60000);
                        const dHours = Math.floor(totalMins / 60);
                        const dMins = totalMins % 60;
                        dayLengthStr = `${dHours}h ${dMins}m`;
                        
                        const nDiffMs = (24 * 60 * 60 * 1000) - diffMs;
                        const nTotalMins = Math.floor(nDiffMs / 60000);
                        const nHours = Math.floor(nTotalMins / 60);
                        const nMins = nTotalMins % 60;
                        nightLengthStr = `${nHours}h ${nMins}m`;

                const nextMoons = getNextMoonDates(now, location.tz);

                section.innerHTML = `
                    <div class="view-toggle">

                            <div class="metric-value">${Math.round(cur.temperature_2m ?? 0)}°C</div>
                            <div class="metric-value" style="font-size:var(--font-md); margin-top:4px; opacity:0.85;">${Math.round(cToF(cur.temperature_2m ?? 0))}°F</div>
                            <span class="metric-sub">${t('feels')} ${Math.round(cur.apparent_temperature ?? 0)}°C / ${Math.round(cToF(cur.apparent_temperature ?? 0))}°F</span>
                        </div>
                        <div class="bento-card card-sun">
                            <span class="metric-label">${t('sun')}</span>
                            <span class="metric-value">🌅 ${escapeHTML(sunrise)}</span>
                            <span class="metric-value" style="margin-top: 10px; color: #fbbf24;">🌇 ${escapeHTML(sunset)}</span>
                        </div>
                        <div class="bento-card card-moon">
                            <span class="metric-label">${t('moon')}</span>
                            <span class="metric-value">🌛 ${escapeHTML(moonriseStr)}</span>
                            <span class="metric-value" style="margin-top: 10px; opacity: 0.8;">🌜 ${escapeHTML(moonsetStr)}</span>
                        </div>
                        
                        <div class="bento-card">
                            <span class="metric-label">${t('solar')}</span>
                            <span class="metric-value" style="font-size: var(--font-md);">☀️ ${t('noon')}: ${fmtSun(sunTimes.solarNoon)}</span>
                            <span class="metric-value" style="font-size: var(--font-md); margin-top: 6px;">🌑 ${t('nadir')}: ${fmtSun(sunTimes.nadir)}</span>
                            <div style="display: flex; justify-content: space-between; margin-top: 10px; border-top: 1px dashed var(--border-color); padding-top: 10px;">
                                <div style="display: flex; flex-direction: column;">
                                    <span class="metric-label" style="margin-bottom: 2px;">${t('az')}</span>
                                    <span class="metric-value" style="font-size: var(--font-md);">${sunAzimuth}°</span>
                                </div>
                                <div style="display: flex; flex-direction: column; text-align: right;">
                                    <span class="metric-label" style="margin-bottom: 2px;">${t('alt')}</span>
                                    <span class="metric-value" style="font-size: var(--font-md);">${sunAltitude}°</span>
                                </div>
                            </div>
                        </div>

                        <div class="bento-card">
                            <span class="metric-label">${t('dn')}</span>
                            <span class="metric-value" style="font-size: var(--font-lg);">☀️ ${dayLengthStr}</span>
                            <span class="metric-value" style="margin-top: 10px; color: #cbd5e1; font-size: var(--font-lg);">🌙 ${nightLengthStr}</span>
                        </div>
                        <div class="bento-card">
                            <span class="metric-label">${t('hum')}</span>
                            <span class="metric-value">${cur.relative_humidity_2m ?? 0}%</span>
                            <span class="metric-sub">${t('dew')}: ${Math.round(cur.dew_point_2m ?? 0)}°C / ${Math.round(cToF(cur.dew_point_2m ?? 0))}°F</span>
                        </div>
                        <div class="bento-card">
                            <span class="metric-label">${t('wind')}</span>
                            <span class="metric-value">${windKmh} km/h</span>
                            <span class="metric-sub">${windMph} mph</span>
                        </div>
                        <div class="bento-card">
                            <span class="metric-label">${t('press')}</span>
                            <span class="metric-value">${pressureHpa} hPa</span>
                            <span class="metric-sub">${pressureInhg} inHg</span>
                        </div>
                        <div class="bento-card card-uv" title="${uvSummary}">
                            <span class="metric-label">${t('uv')} ℹ️</span>
                            <span class="metric-value">${uvNowVal !== null ? uvNowVal.toFixed(1) : '--'}</span>
                            <span class="metric-sub">${t('uv_max')}: ${uvMaxVal !== null ? uvMaxVal.toFixed(1) : '--'}</span>
                        </div>
                        <div class="bento-card">
                            <span class="metric-label">${t('aqi')}</span>
                            <span class="metric-value" style="color: ${aqiObj.color};">${aqiVal}</span>
                            <span class="metric-sub">${aqiObj.text}</span>
                        </div>
                        <div class="bento-card">
                            <span class="metric-label">${t('pollutants')}</span>
                            <span class="metric-value" style="font-size: var(--font-md);">CO₂: ${co2Val !== null ? Math.round(co2Val) : '--'} ppm</span>
                            <span class="metric-value" style="font-size: var(--font-md); margin-top: 6px;">NO₂: ${no2Val !== null ? Math.round(no2Val) : '--'} µg/m³</span>
                            <span class="metric-value" style="font-size: var(--font-md); margin-top: 6px;">${t('dust')}: ${dustVal !== null ? Math.round(dustVal) : '--'} µg/m³</span>
                        </div>
                        <div class="bento-card">
                            <span class="metric-label">${t('vis')}</span>
                            <span class="metric-value">${visKm !== null ? `${visKm} km` : '--'}</span>
                            <span class="metric-sub">${visMi !== null ? `${visMi} mi &bull; ${visDesc}` : t('vis_na')}</span>
                        </div>
                    </div>

                    <div id="hourly-view" class="forecast-view">
                        ${forecasts.hourlyHtml}
                    </div>

                    <div id="daily-view" class="forecast-view">
                        ${forecasts.dailyHtml}
                    </div>

                    <div id="lunar-view" class="forecast-view">
                        <div class="bento-grid">
                            <div class="bento-card">
                                <span class="metric-label">${t('mPhase')}</span>
                                <div class="metric-value" style="font-size: 1.8rem; margin-bottom: 4px;">${moonPhaseInfo.icon}</div>
                            </div>
                            <div class="bento-card">
                                <span class="metric-label">${t('mIllum')}</span>
                                <div class="metric-value">${Math.round(moonIllum.fraction * 100)}%</div>
                                <span class="metric-sub">${t('m_sub1')}</span>
                            </div>
                            <div class="bento-card">
                                <span class="metric-label">${t('mDist')}</span>
                                <div class="metric-value">${moonDistKm.toLocaleString(locale)} km</div>
                                <span class="metric-sub">${moonDistMi.toLocaleString(locale)} mi</span>
                            </div>
                            <div class="bento-card">
                                <span class="metric-label">${t('mNextF')}</span>
                                <div class="metric-value" style="font-size: var(--font-md);">${nextMoons.fullDate}</div>
                            </div>
                            <div class="bento-card">
                                <span class="metric-label">${t('mNextN')}</span>
                                <div class="metric-value" style="font-size: var(--font-md);">${nextMoons.newDate}</div>
                            </div>
                            <div class="bento-card">
                                <span class="metric-label">${t('mAge')}</span>
                                <div class="metric-value">${moonAgeDays} d</div>
                                <span class="metric-sub">${t('m_sub3')}</span>
                            </div>
                        </div>

                        <div class="lighting-grid">
                            <div class="lighting-card">
                                <h4>🌅 ${t('m_light')}</h4>
                                <div class="lighting-item">
                                    <span class="lighting-label">${t('b_hour')} (-8° TO -4°)</span>
                                    <span class="lighting-time">${fmtSun(sunTimes.blueHourMorningStart)} -&gt; ${fmtSun(sunTimes.blueHourMorningEnd)}</span>
                                </div>
                                <div class="lighting-item">
                                    <span class="lighting-label">${t('g_hour')} (-4° TO +6°)</span>
                                    <span class="lighting-time">${fmtSun(sunTimes.blueHourMorningEnd)} -&gt; ${fmtSun(sunTimes.goldenHourEnd)}</span>
                                </div>
                                <div class="twilight-list">
                                    <span class="lighting-label" style="margin-bottom: 4px;">${t('m_twi')}</span>
                                    <div class="twilight-row">
                                        <span>${t('astro')}</span>
                                        <span>${fmtSun(sunTimes.nightEnd)} -&gt; ${fmtSun(sunTimes.nauticalDawn)}</span>
                                    </div>
                                    <div class="twilight-row">
                                        <span>${t('naut')}</span>
                                        <span>${fmtSun(sunTimes.nauticalDawn)} -&gt; ${fmtSun(sunTimes.dawn)}</span>
                                    </div>
                                    <div class="twilight-row">
                                        <span>${t('civil')}</span>
                                        <span>${fmtSun(sunTimes.dawn)} -&gt; ${fmtSun(sunTimes.sunrise)}</span>
                                    </div>
                                </div>
                            </div>

                            <div class="lighting-card">
                                <h4>🌇 ${t('e_light')}</h4>
                                <div class="lighting-item">
                                    <span class="lighting-label">${t('g_hour')} (+6° TO -4°)</span>
                                    <span class="lighting-time">${fmtSun(sunTimes.goldenHour)} -&gt; ${fmtSun(sunTimes.blueHourEveningStart)}</span>
                                </div>
                                <div class="lighting-item">
                                    <span class="lighting-label">${t('b_hour')} (-4° TO -8°)</span>
                                    <span class="lighting-time">${fmtSun(sunTimes.blueHourEveningStart)} -&gt; ${fmtSun(sunTimes.blueHourEveningEnd)}</span>
                                </div>
                                <div class="twilight-list">
                                    <span class="lighting-label" style="margin-bottom: 4px;">${t('e_twi')}</span>
                                    <div class="twilight-row">
                                        <span>${t('civil')}</span>
                                        <span>${fmtSun(sunTimes.sunset)} -&gt; ${fmtSun(sunTimes.dusk)}</span>
                                    </div>
                                    <div class="twilight-row">
                                        <span>${t('naut')}</span>
                                        <span>${fmtSun(sunTimes.dusk)} -&gt; ${fmtSun(sunTimes.nauticalDusk)}</span>
                                    </div>
                                    <div class="twilight-row">
                                        <span>${t('astro')}</span>
                                        <span>${fmtSun(sunTimes.nauticalDusk)} -&gt; ${fmtSun(sunTimes.night)}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;

            } else {
                section.innerHTML = `
                    <div class="error-card">
                        <h3>${t('err')}</h3>
                        <p>${t('err_txt')}</p>
                    </div>`;
            }
        }

        document.addEventListener('click', (event) => {
            const toggleBtn = event.target.closest('.toggle-btn');
            if (toggleBtn && toggleBtn.dataset.subtab) {
                switchSubTab(toggleBtn.dataset.subtab);
                return;
            }

            const isTab = event.target.closest('.tab');
            const isContent = event.target.closest('.content-area');
            const isSearch = event.target.closest('.search-container');
            
            if (!isTab && !isContent && !isSearch) {
                if (activeCityName !== null) {
                    activeCityName = null;
                    renderApp(); 
                }
            }
        });

        document.getElementById('add-city-btn').addEventListener('click', addCity);

        document.getElementById('city-search').addEventListener('keypress', e => { 
            if (e.key === 'Enter') addCity(); 
        });

        init();
    </script>
</body>
</html>
